<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box Game FINAL</title>

<script src="https://unpkg.com/html5-qrcode@2.3.9/minified/html5-qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
  padding-top:40px;
}

.card{
  display:inline-block;
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:380px;
}

#lock{
  font-size:65px;
  transition:0.4s;
}

.unlock{
  transform:scale(1.3) rotate(10deg);
  filter:drop-shadow(0 0 20px #22c55e);
}

.door{
  width:180px;
  height:200px;
  margin:15px auto;
  position:relative;
  overflow:hidden;
  border-radius:12px;
  background:#334155;
}

.left,.right{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:#0b1220;
  transition:0.8s ease;
}

.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

button{
  margin:8px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.good{color:#22c55e;font-size:24px;}
.bad{color:#ef4444;font-size:24px;}

#reader{
  width:100%;
  display:none;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Escape Box Game</h2>

<div id="lock">🔒</div>

<div class="door" id="door">
  <div class="left"></div>
  <div class="right"></div>
</div>

<div id="result">Start game</div>

<button onclick="startFirstScan()">📷 Scan First Box</button>
<button onclick="startSecondScan()">📷 Scan Second Box</button>
<button onclick="resetGame()">Reset</button>

<div id="reader"></div>

</div>

<script>

let firstBox = null;
let secondBox = null;
let scanner = null;

/* SAFE PARSE */
function parseBox(text){
  return text.includes("box=")
    ? text.split("box=")[1]
    : text;
}

/* INIT (QR LINK SUPPORT) */
function init(){
  let box = new URLSearchParams(window.location.search).get("box");

  if(box){
    firstBox = box;
    sessionStorage.setItem("firstBox", box);

    document.getElementById("result").innerHTML =
      "✔ First box (QR): <b>"+box+"</b><br>👉 Scan second box";
  } else {
    firstBox = sessionStorage.getItem("firstBox");
  }
}

/* STOP SCANNER SAFE */
function stopScan(callback){
  if(scanner){
    scanner.stop().then(()=>{
      scanner.clear();
      scanner = null;
      document.getElementById("reader").style.display="none";
      callback();
    }).catch(()=>{
      scanner = null;
      document.getElementById("reader").style.display="none";
      callback();
    });
  } else {
    callback();
  }
}

/* FIRST SCAN */
function startFirstScan(){

  document.getElementById("reader").style.display="block";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps:10, qrbox:250 },
    (text)=>{
      firstBox = parseBox(text);
      sessionStorage.setItem("firstBox", firstBox);

      stopScan(()=>{
        document.getElementById("result").innerHTML =
          "✔ First box (scan): <b>"+firstBox+"</b><br>👉 Scan second box";
      });
    }
  ).catch(err=>{
    alert("Camera error: "+err);
  });
}

/* SECOND SCAN */
function startSecondScan(){

  if(!firstBox){
    alert("Scan FIRST box dulu!");
    return;
  }

  document.getElementById("reader").style.display="block";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps:10, qrbox:250 },
    (text)=>{
      secondBox = parseBox(text);

      stopScan(()=>{
        checkResult();
      });
    }
  ).catch(err=>{
    alert("Camera error: "+err);
  });
}

/* RESULT */
function checkResult(){

  let ok = (firstBox === secondBox);

  beep(ok);
  anim(ok);

  document.getElementById("result").innerHTML =
    ok
    ? "<div class='good'>TREASURE UNLOCKED 🎉</div>"
    : "<div class='bad'>WRONG COMBINATION ❌</div>";

  sessionStorage.removeItem("firstBox");
}

/* ANIMATION */
function anim(ok){
  if(ok){
    document.getElementById("lock").innerText="🔓";
    document.getElementById("lock").classList.add("unlock");
    document.getElementById("door").classList.add("open");
  }
}

/* SOUND */
function beep(ok){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let o = ctx.createOscillator();
  o.frequency.value = ok ? 900 : 200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),120);
}

/* RESET */
function resetGame(){
  sessionStorage.clear();
  location.href = location.pathname;
}

init();

</script>

</body>
</html>
