<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box Full Camera</title>

<script src="https://unpkg.com/html5-qrcode@2.3.9/minified/html5-qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

/* FULLSCREEN CAMERA */
#reader{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  display:none;
  background:black;
  z-index:9999;
}

/* UI */
.card{
  padding-top:60px;
}

#lock{
  font-size:70px;
}

.door{
  width:180px;
  height:200px;
  margin:20px auto;
  background:#334155;
  position:relative;
  overflow:hidden;
  border-radius:12px;
}

.left,.right{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:#0b1220;
  transition:0.7s;
}

.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

.good{color:#22c55e;font-size:22px;}
.bad{color:#ef4444;font-size:22px;}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Escape Box Game</h2>

<div id="lock">🔒</div>

<div class="door" id="door">
  <div class="left"></div>
  <div class="right"></div>
</div>

<div id="result">Scan first box</div>

<button onclick="startFirst()">📷 Scan First Box</button>
<button onclick="startSecond()">📷 Scan Second Box</button>
<button onclick="resetGame()">Reset</button>

</div>

<div id="reader"></div>

<script>

let firstBox = sessionStorage.getItem("firstBox") || null;
let scanner = null;

/* PARSE */
function parse(text){
  return text.includes("box=")
    ? text.split("box=")[1]
    : text;
}

/* OPEN CAMERA FULLSCREEN */
function openCamera(onScan){

  document.getElementById("reader").style.display = "block";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: { width: 250, height: 250 }
    },
    (text) => {
      let box = parse(text);
      stopCamera(() => onScan(box));
    }
  ).catch(err => {
    alert("Camera error: " + err);
  });
}

/* STOP CAMERA */
function stopCamera(cb){
  if(scanner){
    scanner.stop().then(() => {
      scanner.clear();
      scanner = null;
      document.getElementById("reader").style.display = "none";
      cb();
    }).catch(() => {
      scanner = null;
      document.getElementById("reader").style.display = "none";
      cb();
    });
  }
}

/* FIRST SCAN */
function startFirst(){
  openCamera((box) => {
    firstBox = box;
    sessionStorage.setItem("firstBox", box);

    document.getElementById("result").innerHTML =
      "✔ First box: <b>"+box+"</b><br>👉 Scan second box";
  });
}

/* SECOND SCAN */
function startSecond(){

  if(!firstBox){
    alert("Scan FIRST box dulu!");
    return;
  }

  openCamera((box) => {

    let ok = (firstBox === box);

    beep(ok);
    vibrate(ok);
    anim(ok);

    document.getElementById("result").innerHTML =
      ok
      ? "<div class='good'>UNLOCKED 🎉</div>"
      : "<div class='bad'>WRONG ❌</div>";

    sessionStorage.removeItem("firstBox");
  });
}

/* ANIMATION */
function anim(ok){
  if(ok){
    document.getElementById("lock").innerText="🔓";
    document.getElementById("door").classList.add("open");
  }
}

/* SOUND */
function beep(ok){
  let ctx = new AudioContext();
  let o = ctx.createOscillator();
  o.frequency.value = ok ? 900 : 200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),120);
}

/* VIBRATION */
function vibrate(ok){
  if(navigator.vibrate){
    navigator.vibrate(ok ? 120 : 300);
  }
}

/* RESET */
function resetGame(){
  sessionStorage.clear();
  location.reload();
}

</script>

</body>
</html>
