<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box Stable</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
  padding-top:40px;
}

.card{
  display:inline-block;
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:380px;
}

#lock{font-size:65px;}

.door{
  width:180px;
  height:200px;
  margin:15px auto;
  background:#334155;
  position:relative;
  overflow:hidden;
  border-radius:12px;
}

.left,.right{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:#0b1220;
  transition:0.7s;
}

.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

button{
  margin:8px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
}

.good{color:#22c55e;font-size:24px;}
.bad{color:#ef4444;font-size:24px;}

#reader{
  width:100%;
  display:none;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Escape Box Game</h2>

<div id="lock">🔒</div>

<div class="door" id="door">
  <div class="left"></div>
  <div class="right"></div>
</div>

<div id="result">Start game</div>

<button onclick="scanFirst()">📷 Scan First Box</button>
<button onclick="scanSecond()">📷 Scan Second Box</button>
<button onclick="resetGame()">Reset</button>

<div id="reader"></div>

</div>

<script>

let firstBox = null;

/* QR URL SUPPORT */
function init(){
  let box = new URLSearchParams(window.location.search).get("box");
  if(box){
    firstBox = box;
    sessionStorage.setItem("firstBox", box);

    document.getElementById("result").innerHTML =
      "✔ First box (QR): <b>"+box+"</b><br>👉 Scan second box";
  }
}

/* SCAN FIRST (SIMPLE LIKE YOUR ORIGINAL) */
function scanFirst(){

  document.getElementById("reader").style.display = "block";

  let scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps:10, qrbox:250 },
    (text)=>{

      firstBox = text.includes("box=")
        ? text.split("box=")[1]
        : text;

      sessionStorage.setItem("firstBox", firstBox);

      scanner.stop();

      document.getElementById("result").innerHTML =
        "✔ First box: <b>"+firstBox+"</b><br>👉 Scan second box";
    }
  );
}

/* SCAN SECOND (KEEP SAME STYLE) */
function scanSecond(){

  if(!firstBox){
    alert("Scan first box dulu!");
    return;
  }

  document.getElementById("reader").style.display = "block";

  let scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps:10, qrbox:250 },
    (text)=>{

      let secondBox = text.includes("box=")
        ? text.split("box=")[1]
        : text;

      scanner.stop();

      check(secondBox);
    }
  );
}

/* RESULT */
function check(secondBox){

  let ok = (firstBox === secondBox);

  if(ok){
    document.getElementById("lock").innerText="🔓";
    document.getElementById("door").classList.add("open");
    document.getElementById("result").innerHTML =
      "<div class='good'>UNLOCKED 🎉</div>";
  }else{
    document.getElementById("result").innerHTML =
      "<div class='bad'>WRONG ❌</div>";
  }

  sessionStorage.removeItem("firstBox");
}

/* RESET */
function resetGame(){
  sessionStorage.clear();
  location.href = location.pathname;
}

init();

</script>

</body>
</html>
