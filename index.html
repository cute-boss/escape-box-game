<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box Game PRO+</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
  padding-top:40px;
}

.card{
  display:inline-block;
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:380px;
}

#lock{
  font-size:65px;
  transition:0.4s;
}

.unlock{
  transform:scale(1.3) rotate(10deg);
  filter:drop-shadow(0 0 20px #22c55e);
}

.door{
  width:180px;
  height:200px;
  margin:15px auto;
  position:relative;
  overflow:hidden;
  border-radius:12px;
  background:#334155;
}

.left,.right{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:#0b1220;
  transition:0.8s ease;
}

.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.good{color:#22c55e;font-size:24px;}
.bad{color:#ef4444;font-size:24px;}

#reader{
  width:100%;
  display:none;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Escape Box Game</h2>

<div id="lock">🔒</div>

<div class="door" id="door">
  <div class="left"></div>
  <div class="right"></div>
</div>

<div id="result">Scan QR Box A untuk mula</div>

<button onclick="startSecondScan()">📷 Scan Second Box</button>
<button onclick="resetGame()">Reset</button>

<div id="reader"></div>

</div>

<script>

let firstBox = null;
let secondBox = null;

function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

/* STEP 1 - QR A SCAN */
function initFirstScan(){
  let box = getParam("box");
  if(box){
    firstBox = box;
    sessionStorage.setItem("firstBox", box);

    document.getElementById("result").innerHTML =
      "✔ First box locked: <b>"+box+"</b><br>👉 Click button to scan second box";
  } else {
    firstBox = sessionStorage.getItem("firstBox");
  }
}

/* CAMERA SCAN */
function startSecondScan(){

  document.getElementById("reader").style.display = "block";

  let scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      secondBox = decodedText.split("box=")[1] || decodedText;

      scanner.stop();

      checkResult();
    }
  );
}

/* RESULT */
function checkResult(){

  let ok = (firstBox === secondBox);

  beep(ok);
  unlockAnim(ok);

  document.getElementById("result").innerHTML =
    ok
    ? "<div class='good'>TREASURE UNLOCKED 🎉</div>"
    : "<div class='bad'>WRONG COMBINATION ❌</div>";

  sessionStorage.removeItem("firstBox");
}

/* ANIMATION */
function unlockAnim(ok){
  if(ok){
    document.getElementById("lock").innerText="🔓";
    document.getElementById("lock").classList.add("unlock");
    document.getElementById("door").classList.add("open");
  }
}

/* SOUND */
function beep(ok){
  let ctx = new AudioContext();
  let o = ctx.createOscillator();
  o.frequency.value = ok ? 800 : 200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}

/* RESET */
function resetGame(){
  sessionStorage.removeItem("firstBox");
  location.href = location.pathname;
}

initFirstScan();

</script>

</body>
</html>
