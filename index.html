<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box FIX</title>

<script src="https://unpkg.com/html5-qrcode@2.3.9/minified/html5-qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
  padding-top:40px;
}

.card{
  display:inline-block;
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:360px;
}

#lock{font-size:65px;}

.door{
  width:180px;
  height:200px;
  margin:15px auto;
  background:#334155;
  position:relative;
  overflow:hidden;
}

.left,.right{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:#0b1220;
  transition:0.7s;
}

.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

.good{color:#22c55e;font-size:22px;}
.bad{color:#ef4444;font-size:22px;}

#reader{
  width:100%;
  display:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Escape Box Game</h2>

<div id="lock">🔒</div>

<div class="door" id="door">
  <div class="left"></div>
  <div class="right"></div>
</div>

<div id="result">Scan QR Box A dulu</div>

<button onclick="startScan()">📷 Scan Box Kedua</button>
<button onclick="resetGame()">Reset</button>

<div id="reader"></div>

</div>

<script>

let firstBox = sessionStorage.getItem("firstBox");
let scanner;

function getBox(){
  let url = new URL(window.location.href);
  return url.searchParams.get("box");
}

/* STEP 1 */
function init(){
  let box = getBox();

  if(box){
    firstBox = box;
    sessionStorage.setItem("firstBox", box);

    document.getElementById("result").innerHTML =
      "✔ Box pertama: <b>"+box+"</b><br>👉 tekan button scan second box";
  }
}

/* STEP 2 SCAN */
function startScan(){

  document.getElementById("reader").style.display = "block";

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(() => {

    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      (decodedText) => {

        // SAFE parse (no split fragile)
        let secondBox = decodedText.includes("box=")
          ? decodedText.substring(decodedText.indexOf("box=")+4)
          : decodedText;

        stopScan(secondBox);

      }

    );

  });

}

/* STOP SAFELY */
function stopScan(secondBox){

  scanner.stop().then(() => {

    document.getElementById("reader").style.display = "none";

    check(secondBox.trim());

  });

}

/* CHECK */
function check(secondBox){

  let ok = (firstBox === secondBox);

  beep(ok);
  anim(ok);

  document.getElementById("result").innerHTML =
    ok
    ? "<div class='good'>TREASURE UNLOCKED 🎉</div>"
    : "<div class='bad'>WRONG COMBINATION ❌</div>";

  sessionStorage.removeItem("firstBox");
}

/* ANIM */
function anim(ok){
  if(ok){
    document.getElementById("lock").innerText="🔓";
    document.getElementById("door").classList.add("open");
  }
}

/* SOUND */
function beep(ok){
  let ctx = new AudioContext();
  let o = ctx.createOscillator();
  o.frequency.value = ok ? 800 : 200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}

/* RESET */
function resetGame(){
  sessionStorage.clear();
  location.href = location.pathname;
}

init();

</script>

</body>
</html>
