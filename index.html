<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box Game</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
  padding-top:40px;
}

.card{
  display:inline-block;
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:380px;
}

#lock{font-size:65px;}

/* ICON RESULT */
#icon{
  font-size:90px;
  margin:15px 0;
}

.good{color:#22c55e;font-size:24px;}
.bad{color:#ef4444;font-size:24px;}

button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
}

/* CAMERA */
#reader{
  width:100%;
  display:none;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Escape Box Game</h2>

<div id="lock">🔒</div>

<div id="icon"></div>

<div id="result">Imbas kod untuk mula permainan</div>

<button id="btn1" onclick="startFirstScan()">📷 SCAN BOX PERTAMA</button>
<button id="btn2" onclick="startSecondScan()">📷 SCAN BOX KEDUA</button>
<button id="backBtn" onclick="resetGame()" style="display:none;">🔁 KEMBALI</button>

<div id="reader"></div>

</div>

<script>

let firstBox = null;

/* 🎵 BACKGROUND MUSIC */
let bgMusic = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b3c1c.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.2;

/* 🔊 SOUND EFFECT (ringkas, tak kacau camera) */
function playBeep(ok){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let o = ctx.createOscillator();
  o.frequency.value = ok ? 800 : 200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}

/* 🗣️ VOICE BM */
function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  msg.lang = "ms-MY";
  speechSynthesis.speak(msg);
}

/* SCAN FIRST */
function startFirstScan(){

  // start music once user interact
  bgMusic.play().catch(()=>{});

  document.getElementById("reader").style.display="block";

  let scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    (text)=>{

      firstBox = text.includes("box=")
        ? text.split("box=")[1]
        : text;

      sessionStorage.setItem("firstBox", firstBox);

      scanner.stop();

      document.getElementById("result").innerHTML =
        "✔ Box pertama: <b>"+firstBox+"</b><br>Scan box kedua";
    }
  );
}

/* SCAN SECOND */
function startSecondScan(){

  if(!firstBox){
    alert("Scan box pertama dulu!");
    return;
  }

  document.getElementById("reader").style.display="block";

  let scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    (text)=>{

      let secondBox = text.includes("box=")
        ? text.split("box=")[1]
        : text;

      scanner.stop();

      check(secondBox);
    }
  );
}

/* RESULT */
function check(secondBox){

  let ok = (firstBox === secondBox);

  playBeep(ok);

  if(ok){
    document.getElementById("icon").innerHTML="✔";
    document.getElementById("icon").style.color="#22c55e";

    document.getElementById("lock").innerText="🔓";

    document.getElementById("result").innerHTML =
      "<div class='good'>TAHNIAH ANDA BETUL 🎉</div>";

    speak("Tahniah anda betul");
  }else{
    document.getElementById("icon").innerHTML="✖";
    document.getElementById("icon").style.color="#ef4444";

    document.getElementById("result").innerHTML =
      "<div class='bad'>SALAH SILA CUBA LAGI</div>";

    speak("Salah, sila cuba lagi");
  }

  // hide scan buttons
  document.getElementById("btn1").style.display="none";
  document.getElementById("btn2").style.display="none";

  // show back button
  document.getElementById("backBtn").style.display="inline-block";

  sessionStorage.removeItem("firstBox");
}

/* RESET */
function resetGame(){
  bgMusic.pause();
  bgMusic.currentTime = 0;
  sessionStorage.clear();
  location.href = location.pathname;
}

</script>

</body>
</html>
