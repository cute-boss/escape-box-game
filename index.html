<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box Game FIXED</title>

<script src="https://unpkg.com/html5-qrcode@2.3.9/minified/html5-qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
  padding-top:40px;
}

.card{
  display:inline-block;
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:380px;
}

#lock{font-size:70px;}

.unlock{
  transform:scale(1.2);
  filter:drop-shadow(0 0 15px #22c55e);
}

.door{
  width:180px;
  height:200px;
  margin:15px auto;
  position:relative;
  overflow:hidden;
  background:#334155;
  border-radius:10px;
}

.left,.right{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:#0b1220;
  transition:0.7s;
}

.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

button{
  padding:10px 15px;
  margin:8px;
  border:none;
  border-radius:10px;
}

#reader{
  width:100%;
  display:none;
  margin-top:15px;
}

.good{color:#22c55e;font-size:22px;}
.bad{color:#ef4444;font-size:22px;}
</style>
</head>

<body>

<div class="card">
  <h2>🔐 Escape Box Game</h2>

  <div id="lock">🔒</div>

  <div class="door" id="door">
    <div class="left"></div>
    <div class="right"></div>
  </div>

  <div id="result">Scan QR Box A dulu</div>

  <button onclick="startScan()">📷 Scan Second Box</button>
  <button onclick="resetGame()">Reset</button>

  <div id="reader"></div>
</div>

<script>

let firstBox = sessionStorage.getItem("firstBox") || null;
let scanner = null;

function getBoxFromURL(){
  let box = new URLSearchParams(window.location.search).get("box");
  if(box){
    firstBox = box;
    sessionStorage.setItem("firstBox", box);

    document.getElementById("result").innerHTML =
      "✔ First box locked: <b>"+box+"</b><br>👉 Now click scan second box";
  }
}

function startScan(){

  document.getElementById("reader").style.display = "block";

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(() => {

    scanner.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: 250
      },
      (text) => {

        // extract box value safely
        let secondBox = text.includes("box=")
          ? text.split("box=")[1]
          : text;

        scanner.stop().then(() => {

          document.getElementById("reader").style.display = "none";

          check(secondBox);

        });

      }
    );

  });

}

function check(secondBox){

  let ok = (firstBox === secondBox);

  beep(ok);
  anim(ok);

  document.getElementById("result").innerHTML =
    ok
    ? "<div class='good'>TREASURE UNLOCKED 🎉</div>"
    : "<div class='bad'>WRONG COMBINATION ❌</div>";

  sessionStorage.removeItem("firstBox");
}

function anim(ok){
  if(ok){
    document.getElementById("lock").innerText="🔓";
    document.getElementById("door").classList.add("open");
  }
}

function beep(ok){
  let ctx = new AudioContext();
  let o = ctx.createOscillator();
  o.frequency.value = ok ? 800 : 200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}

function resetGame(){
  sessionStorage.clear();
  location.href = location.pathname;
}

getBoxFromURL();

</script>

</body>
</html>
