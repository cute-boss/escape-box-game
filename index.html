<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box FIX</title>

<script src="https://unpkg.com/html5-qrcode@2.3.9/minified/html5-qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
  padding-top:40px;
}

.card{
  display:inline-block;
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:380px;
}

#lock{font-size:65px;}

.door{
  width:180px;
  height:200px;
  margin:15px auto;
  background:#334155;
  position:relative;
  overflow:hidden;
  border-radius:12px;
}

.left,.right{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:#0b1220;
  transition:0.7s;
}

.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

button{
  padding:10px 15px;
  margin:8px;
  border:none;
  border-radius:10px;
}

.good{color:#22c55e;font-size:22px;}
.bad{color:#ef4444;font-size:22px;}

#reader{
  width:100%;
  display:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Escape Box Game</h2>

<div id="lock">🔒</div>

<div class="door" id="door">
  <div class="left"></div>
  <div class="right"></div>
</div>

<div id="result">Scan first box</div>

<button onclick="startFirst()">📷 Scan First Box</button>
<button onclick="startSecond()">📷 Scan Second Box</button>
<button onclick="resetGame()">Reset</button>

<div id="reader"></div>

</div>

<script>

let firstBox = sessionStorage.getItem("firstBox") || null;
let scanner = null;

/* SAFE PARSE */
function parse(text){
  return text.includes("box=")
    ? text.split("box=")[1]
    : text;
}

/* STOP SCANNER SAFE */
function stopScan(cb){
  if(scanner){
    scanner.stop().then(() => {
      scanner.clear();
      scanner = null;

      document.getElementById("reader").style.display = "none";

      cb();
    }).catch(() => {
      scanner = null;
      document.getElementById("reader").style.display = "none";
      cb();
    });
  } else {
    cb();
  }
}

/* START FIRST */
function startFirst(){

  document.getElementById("reader").style.display = "block";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {

      firstBox = parse(text);
      sessionStorage.setItem("firstBox", firstBox);

      stopScan(() => {
        document.getElementById("result").innerHTML =
          "✔ First box: <b>"+firstBox+"</b><br>👉 Now scan second";
      });

    }
  ).catch(err => {
    alert("Camera error: " + err);
  });
}

/* START SECOND */
function startSecond(){

  if(!firstBox){
    alert("Scan FIRST box dulu!");
    return;
  }

  document.getElementById("reader").style.display = "block";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {

      let secondBox = parse(text);

      stopScan(() => check(secondBox));

    }
  ).catch(err => {
    alert("Camera error: " + err);
  });
}

/* CHECK */
function check(secondBox){

  let ok = (firstBox === secondBox);

  beep(ok);
  vibrate(ok);
  anim(ok);

  document.getElementById("result").innerHTML =
    ok
    ? "<div class='good'>UNLOCKED 🎉</div>"
    : "<div class='bad'>WRONG ❌</div>";

  sessionStorage.removeItem("firstBox");
}

/* ANIM */
function anim(ok){
  if(ok){
    document.getElementById("lock").innerText="🔓";
    document.getElementById("door").classList.add("open");
  }
}

/* SOUND */
function beep(ok){
  let ctx = new AudioContext();
  let o = ctx.createOscillator();
  o.frequency.value = ok ? 800 : 200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}

/* VIBRATE */
function vibrate(ok){
  if(navigator.vibrate){
    navigator.vibrate(ok ? 100 : 300);
  }
}

/* RESET */
function resetGame(){
  sessionStorage.clear();
  location.href = location.pathname;
}

</script>

</body>
</html>
