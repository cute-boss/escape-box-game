<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box Game</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
  padding-top:40px;
}

.card{
  display:inline-block;
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:380px;
}

/* ICON RESULT */
#icon{
  font-size:80px;
  margin:10px 0;
}

/* LOCK */
#lock{font-size:65px;}

/* DOOR */
.door{
  width:180px;
  height:200px;
  margin:15px auto;
  position:relative;
  overflow:hidden;
  border-radius:12px;
  background:#334155;
}

.left,.right{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:#0b1220;
  transition:0.8s;
}

.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

/* TEXT */
.good{color:#22c55e;font-size:24px;}
.bad{color:#ef4444;font-size:24px;}

button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
}

/* CAMERA */
#reader{
  width:100%;
  display:none;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Escape Box Game</h2>

<div id="icon"></div>

<div id="lock">🔒</div>

<div class="door" id="door">
  <div class="left"></div>
  <div class="right"></div>
</div>

<div id="result">Imbas kod untuk mula permainan</div>

<button onclick="startFirstScan()">📷 Scan Box Pertama</button>
<button onclick="startSecondScan()">📷 Scan Box Kedua</button>
<button id="backBtn" onclick="resetGame()" style="display:none;">🔁 KEMBALI</button>

<div id="reader"></div>

</div>

<script>

let firstBox = null;

/* 🎵 BACKGROUND MUSIC */
let bgMusic = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b3c1c.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.2;

/* 🔊 SOUND EFFECT */
function playSound(type){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let o = ctx.createOscillator();
  let g = ctx.createGain();

  o.connect(g);
  g.connect(ctx.destination);

  if(type==="success"){
    o.frequency.setValueAtTime(500, ctx.currentTime);
    o.frequency.linearRampToValueAtTime(900, ctx.currentTime+0.2);
  }
  else if(type==="fail"){
    o.frequency.setValueAtTime(300, ctx.currentTime);
    o.frequency.linearRampToValueAtTime(150, ctx.currentTime+0.2);
  }
  else if(type==="start"){
    o.frequency.setValueAtTime(600, ctx.currentTime);
    o.frequency.linearRampToValueAtTime(800, ctx.currentTime+0.1);
  }

  o.start();
  setTimeout(()=>o.stop(),200);
}

/* INIT QR LINK */
function init(){
  let box = new URLSearchParams(window.location.search).get("box");
  if(box){
    firstBox = box;
    sessionStorage.setItem("firstBox", box);

    document.getElementById("result").innerHTML =
      "✔ Box pertama: <b>"+box+"</b><br>Scan box kedua";
  }
}

/* SCAN FIRST */
function startFirstScan(){

  playSound("start");
  bgMusic.play().catch(()=>{});

  document.getElementById("reader").style.display="block";

  let scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    (text)=>{

      firstBox = text.includes("box=")
        ? text.split("box=")[1]
        : text;

      sessionStorage.setItem("firstBox", firstBox);

      scanner.stop();

      document.getElementById("result").innerHTML =
        "✔ Box pertama: <b>"+firstBox+"</b><br>Scan box kedua";
    }
  );
}

/* SCAN SECOND */
function startSecondScan(){

  if(!firstBox){
    alert("Scan box pertama dulu!");
    return;
  }

  document.getElementById("reader").style.display="block";

  let scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    (text)=>{

      let secondBox = text.includes("box=")
        ? text.split("box=")[1]
        : text;

      scanner.stop();

      check(secondBox);
    }
  );
}

/* RESULT */
function check(secondBox){

  let ok = (firstBox === secondBox);

  setTimeout(()=>{
    playSound(ok?"success":"fail");
  },100);

  if(ok){
    document.getElementById("icon").innerHTML="✔";
    document.getElementById("icon").style.color="#22c55e";

    document.getElementById("lock").innerText="🔓";
    document.getElementById("door").classList.add("open");

    document.getElementById("result").innerHTML =
      "<div class='good'>TAHNIAH ANDA BETUL 🎉</div>";
  }else{
    document.getElementById("icon").innerHTML="✖";
    document.getElementById("icon").style.color="#ef4444";

    document.getElementById("result").innerHTML =
      "<div class='bad'>SALAH, SILA CUBA LAGI</div>";
  }

  document.getElementById("backBtn").style.display="inline-block";

  sessionStorage.removeItem("firstBox");
}

/* RESET */
function resetGame(){
  bgMusic.pause();
  bgMusic.currentTime = 0;
  sessionStorage.clear();
  location.href = location.pathname;
}

init();

</script>

</body>
</html>
