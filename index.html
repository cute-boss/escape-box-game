<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box Game</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
  padding-top:40px;
}
.card{
  display:inline-block;
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  width:90%;
  max-width:380px;
}
#lock{font-size:65px;}
#icon{font-size:90px;margin:10px;}
button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
}
.progress{
  width:80%;
  height:10px;
  background:#334155;
  margin:15px auto;
  border-radius:10px;
}
.bar{
  height:100%;
  width:0%;
  background:#22c55e;
  transition:0.4s;
}
#reader{
  width:100%;
  display:none;
  margin-top:15px;
}
.good{color:#22c55e;font-size:24px;}
.bad{color:#ef4444;font-size:24px;}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Escape Box Game</h2>

<div id="lock">🔒</div>
<div id="icon"></div>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<div id="result">Imbas kod untuk mula permainan</div>

<button id="btn1" onclick="startFirstScan()">📷 Scan Box Pertama</button>
<button id="btn2" onclick="startSecondScan()" disabled>📷 Scan Box Kedua</button>
<button id="backBtn" onclick="resetGame()" style="display:none;">🔁 KEMBALI</button>

<div id="reader"></div>

</div>

<script>

let firstBox=null;
let audioCtx=null;
let bgStarted=false;

/* ================= AUDIO INIT ================= */

function initAudio(){
  if(!audioCtx){
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  }
}
function resumeAudio(){
  if(audioCtx && audioCtx.state==="suspended"){
    audioCtx.resume();
  }
}

/* ================= SOUND ================= */

function coinSound(){
  resumeAudio();
  let o=audioCtx.createOscillator();
  o.frequency.setValueAtTime(700,audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(1200,audioCtx.currentTime+0.1);
  o.connect(audioCtx.destination);
  o.start();
  setTimeout(()=>o.stop(),120);
}

function failSound(){
  resumeAudio();
  let o=audioCtx.createOscillator();
  o.frequency.setValueAtTime(300,audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(150,audioCtx.currentTime+0.2);
  o.connect(audioCtx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}

function jumpSound(){
  resumeAudio();
  let o=audioCtx.createOscillator();
  o.frequency.setValueAtTime(400,audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(800,audioCtx.currentTime+0.15);
  o.connect(audioCtx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}

/* ================= VOICE (FEMALE / CHILD) ================= */

let voices=[];

speechSynthesis.onvoiceschanged = () => {
  voices = speechSynthesis.getVoices();
};

function getBestVoice(){
  if(!voices.length) voices = speechSynthesis.getVoices();

  // cari suara perempuan / child
  return voices.find(v =>
    v.lang.includes("ms") ||
    v.lang.includes("en") &&
    (v.name.toLowerCase().includes("female") ||
     v.name.toLowerCase().includes("girl") ||
     v.name.toLowerCase().includes("zira") ||
     v.name.toLowerCase().includes("samantha"))
  ) || voices[0];
}

function speak(text){
  speechSynthesis.cancel();

  let msg=new SpeechSynthesisUtterance(text);
  msg.voice=getBestVoice();
  msg.rate=1;
  msg.pitch=1.2; // lebih “budak feel”

  speechSynthesis.speak(msg);
}

/* ================= BACKGROUND MUSIC ================= */

let bgMusic=new Audio("https://cdn.pixabay.com/audio/2022/10/25/audio_946b9c0c87.mp3");
bgMusic.loop=true;
bgMusic.volume=0;

function startMusic(){
  if(!bgStarted){
    bgStarted=true;
    bgMusic.play().then(()=>{
      fadeInMusic();
    }).catch(()=>{});
  }
}

function fadeInMusic(){
  let vol=0;
  let fade=setInterval(()=>{
    if(vol<0.15){
      vol+=0.01;
      bgMusic.volume=vol;
    }else{
      clearInterval(fade);
    }
  },200);
}

/* ================= PROGRESS ================= */

function setProgress(step){
  document.getElementById("bar").style.width=
    step===1?"50%":"100%";
}

/* ================= SCAN FIRST ================= */

function startFirstScan(){

  initAudio();
  resumeAudio();
  jumpSound();
  startMusic();

  document.getElementById("reader").style.display="block";

  let scanner=new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:250},
    (text)=>{

      firstBox=text.includes("box=")
        ?text.split("box=")[1]
        :text;

      scanner.stop();

      coinSound();

      setProgress(1);

      document.getElementById("result").innerHTML=
        "✔ Box pertama: <b>"+firstBox+"</b><br>Scan box kedua";

      document.getElementById("btn2").disabled=false;
    }
  );
}

/* ================= SCAN SECOND ================= */

function startSecondScan(){

  if(!firstBox){
    alert("Scan box pertama dulu!");
    return;
  }

  document.getElementById("reader").style.display="block";

  let scanner=new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:250},
    (text)=>{

      let secondBox=text.includes("box=")
        ?text.split("box=")[1]
        :text;

      scanner.stop();

      setProgress(2);

      check(secondBox);
    }
  );
}

/* ================= RESULT ================= */

function check(secondBox){

  let ok=(firstBox===secondBox);

  if(ok){
    coinSound();

    document.getElementById("icon").innerHTML="✔";
    document.getElementById("icon").style.color="#22c55e";
    document.getElementById("lock").innerText="🔓";

    document.getElementById("result").innerHTML=
      "<div class='good'>TAHNIAH ANDA BETUL 🎉</div>";

    setTimeout(()=>{
      speak("Tahniah anda betul");
    },200);

  }else{
    failSound();

    document.getElementById("icon").innerHTML="✖";
    document.getElementById("icon").style.color="#ef4444";

    document.getElementById("result").innerHTML=
      "<div class='bad'>SALAH SILA CUBA LAGI</div>";

    setTimeout(()=>{
      speak("Salah sila cuba lagi");
    },200);
  }

  document.getElementById("btn1").style.display="none";
  document.getElementById("btn2").style.display="none";
  document.getElementById("backBtn").style.display="inline-block";
}

/* ================= RESET ================= */

function resetGame(){
  bgMusic.pause();
  bgMusic.currentTime=0;
  location.reload();
}

</script>

</body>
</html>
