<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box Game PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
  padding-top:60px;
}

.card{
  display:inline-block;
  background:#1e293b;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:360px;
}

#lock{
  font-size:70px;
  transition:0.5s;
}

.unlock{
  transform:scale(1.3) rotate(10deg);
  filter:drop-shadow(0 0 20px #22c55e);
}

.door{
  width:180px;
  height:220px;
  margin:20px auto;
  position:relative;
  overflow:hidden;
  border-radius:12px;
  background:#334155;
}

.left,.right{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:#0b1220;
  transition:0.8s ease;
}

.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

#result{
  font-size:20px;
  margin-top:10px;
}

.good{color:#22c55e;font-size:26px;animation:pop 0.5s;}
.bad{color:#ef4444;font-size:26px;}

@keyframes pop{
  0%{transform:scale(0.5);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

button{
  margin-top:15px;
  padding:8px 15px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>🔐 Escape Box Game</h2>

  <div id="lock">🔒</div>

  <div class="door" id="door">
    <div class="left"></div>
    <div class="right"></div>
  </div>

  <div id="result">Scan QR untuk mula</div>

  <button onclick="resetGame()">Reset</button>
</div>

<script>

let box = new URLSearchParams(window.location.search).get("box");
let first = sessionStorage.getItem("firstBox"); 
// 👆 guna sessionStorage (lebih clean dari localStorage)

function beep(ok){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let o = ctx.createOscillator();
  o.type = "square";
  o.frequency.value = ok ? 800 : 200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}

function unlockAnim(ok){
  if(ok){
    document.getElementById("lock").innerText="🔓";
    document.getElementById("lock").classList.add("unlock");
    document.getElementById("door").classList.add("open");
  }
}

/* STEP FLOW SYSTEM */
function run(){

  if(!box) return;

  // STEP 1 (FIRST SCAN)
  if(!first){
    sessionStorage.setItem("firstBox", box);

    document.getElementById("result").innerHTML =
      "✔ First scan locked: <b>"+box+"</b><br><br>👉 Now scan SECOND box";

    return;
  }

  // STEP 2 (SECOND SCAN)
  let ok = (first === box);

  beep(ok);
  unlockAnim(ok);

  if(ok){
    document.getElementById("result").innerHTML =
      "<div class='good'>TREASURE UNLOCKED 🎉</div>";
  }else{
    document.getElementById("result").innerHTML =
      "<div class='bad'>WRONG COMBINATION ❌</div>";
  }

  sessionStorage.removeItem("firstBox");
}

/* RESET GAME */
function resetGame(){
  sessionStorage.removeItem("firstBox");
  location.href = location.pathname;
}

run();

</script>

</body>
</html>
