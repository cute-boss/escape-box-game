<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box Game</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

h2{margin-top:20px}

#lock{font-size:70px;}

.door{
  width:180px;
  height:200px;
  margin:10px auto;
  background:#334155;
  position:relative;
  overflow:hidden;
  border-radius:12px;
}
.door.glow{
  box-shadow:0 0 20px #22c55e,0 0 40px #22c55e;
}

.left,.right{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:#0b1220;
  transition:0.8s;
}
.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

/* START BUTTON */
#startBtn{
  margin-top:20px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  font-size:16px;
}

/* PROGRESS */
.progress{
  width:80%;
  height:10px;
  background:#334155;
  margin:15px auto;
  border-radius:10px;
}
.bar{
  height:100%;
  width:0%;
  background:#22c55e;
  transition:0.5s;
}

.good{color:#22c55e;font-size:26px;}
.bad{color:#ef4444;font-size:24px;}

#reader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  background:black;
  z-index:9999;
}

#scanText{
  position:fixed;
  top:20px;
  width:100%;
  text-align:center;
}
</style>
</head>

<body>

<h2>🔐 Escape Box Game</h2>

<div id="lock">🔒</div>

<div class="door" id="door">
  <div class="left"></div>
  <div class="right"></div>
</div>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<div id="result">Tekan Start untuk mula</div>

<button id="startBtn" onclick="startGame()">▶ Start Game</button>

<div id="reader"></div>
<div id="scanText"></div>

<script>

let firstBox=null;
let stage=1;

/* 🔊 GAME SOUND (MARIO STYLE SIMPLE) */
function playStartSound(){
  let ctx=new AudioContext();
  let o=ctx.createOscillator();
  o.frequency.value=600;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}

/* VOICE */
function speak(text){
  let msg=new SpeechSynthesisUtterance(text);
  msg.lang="ms-MY";
  speechSynthesis.speak(msg);
}

/* VIBRATE */
function vibrate(ok){
  if(navigator.vibrate){
    navigator.vibrate(ok?[100,50,100]:[300]);
  }
}

/* PROGRESS */
function updateBar(){
  document.getElementById("bar").style.width=
    stage===1?"50%":"100%";
}

/* CAMERA UI */
function showCam(text){
  document.getElementById("reader").style.display="block";
  document.getElementById("scanText").innerText=text;
}
function hideCam(){
  document.getElementById("reader").style.display="none";
  document.getElementById("scanText").innerText="";
}

/* MAIN SCAN (UNCHANGED STYLE) */
function scan(){

  showCam(stage===1?"Scan BOX PERTAMA":"Scan BOX KEDUA");

  let scanner=new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:250},
    (text)=>{

      let box=text.includes("box=")
        ?text.split("box=")[1]
        :text;

      scanner.stop();
      hideCam();

      if(stage===1){
        firstBox=box;
        stage=2;
        updateBar();

        document.getElementById("result").innerHTML=
          "✔ Box pertama: <b>"+box+"</b><br>Scan box kedua";

        speak("Box pertama berjaya");

        setTimeout(scan,800); // auto next
      }else{
        check(box);
      }
    }
  );
}

/* RESULT */
function check(second){

  let ok=(firstBox===second);

  vibrate(ok);

  if(ok){
    document.getElementById("lock").innerText="🔓";
    document.getElementById("door").classList.add("open","glow");

    document.getElementById("result").innerHTML=
      "<div class='good'>TAHNIAH ANDA BETUL 🎉</div>";

    speak("Tahniah anda betul");
  }else{
    document.getElementById("result").innerHTML=
      "<div class='bad'>SALAH, SILA CUBA LAGI</div>";

    speak("Salah, sila cuba lagi");
  }
}

/* START */
function startGame(){
  document.getElementById("startBtn").style.display="none";

  playStartSound();
  speak("Permainan bermula");

  updateBar();
  scan();
}

</script>

</body>
</html>
