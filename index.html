<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box Game Premium</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
  padding-top:60px;
}

.card{
  display:inline-block;
  background:#1e293b;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:360px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* LOCK */
#lock{
  font-size:70px;
  transition:0.5s;
}

.unlock{
  transform:scale(1.2) rotate(8deg);
  filter:drop-shadow(0 0 25px #22c55e);
}

/* DOOR */
.door{
  width:180px;
  height:200px;
  margin:20px auto;
  background:#334155;
  position:relative;
  overflow:hidden;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.6);
}

/* glowing effect */
.door.glow{
  box-shadow:0 0 20px #22c55e, 0 0 40px #22c55e;
}

.left,.right{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:#0b1220;
  transition:0.8s ease;
}

.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

/* RESULT */
.good{
  color:#22c55e;
  font-size:26px;
  animation:pop 0.4s ease;
}

.bad{
  color:#ef4444;
  font-size:22px;
}

@keyframes pop{
  0%{transform:scale(0.5);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Escape Box Game</h2>

<div id="lock">🔒</div>

<div class="door" id="door">
  <div class="left"></div>
  <div class="right"></div>
</div>

<div id="result">Scan QR Box A dulu</div>

</div>

<script>

let box = new URLSearchParams(window.location.search).get("box");
let first = sessionStorage.getItem("firstBox");

/* 🔊 SOUND */
function beep(ok){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let o = ctx.createOscillator();
  o.type = "square";
  o.frequency.value = ok ? 900 : 200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),120);
}

/* 📳 VIBRATION */
function vibrate(ok){
  if(navigator.vibrate){
    navigator.vibrate(ok ? [100,50,100] : [300]);
  }
}

/* ✨ ANIMATION */
function unlockAnim(){
  document.getElementById("lock").innerText = "🔓";
  document.getElementById("lock").classList.add("unlock");

  document.getElementById("door").classList.add("open","glow");
}

/* MAIN LOGIC */
function run(){

  if(!box) return;

  // FIRST SCAN
  if(!first){
    sessionStorage.setItem("firstBox", box);

    document.getElementById("result").innerHTML =
      "✔ First box locked: <b>"+box+"</b><br>👉 Scan second box";

    return;
  }

  // SECOND SCAN
  let ok = (first === box);

  beep(ok);
  vibrate(ok);

  if(ok){
    unlockAnim();
    document.getElementById("result").innerHTML =
      "<div class='good'>TREASURE UNLOCKED 🎉</div>";
  }else{
    document.getElementById("result").innerHTML =
      "<div class='bad'>WRONG COMBINATION ❌</div>";
  }

  sessionStorage.removeItem("firstBox");
}

run();

</script>

</body>
</html>
