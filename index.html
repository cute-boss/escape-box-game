<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escape Box Premium</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

/* CARD */
.card{
  padding-top:50px;
}

/* LOCK */
#lock{
  font-size:70px;
  transition:0.4s;
}
.unlock{
  transform:scale(1.3) rotate(10deg);
  filter:drop-shadow(0 0 25px #22c55e);
}

/* DOOR */
.door{
  width:180px;
  height:200px;
  margin:20px auto;
  background:#334155;
  position:relative;
  overflow:hidden;
  border-radius:12px;
}
.door.glow{
  box-shadow:0 0 20px #22c55e,0 0 40px #22c55e;
}

.left,.right{
  position:absolute;
  width:50%;
  height:100%;
  top:0;
  background:#0b1220;
  transition:0.8s;
}
.left{left:0;}
.right{right:0;}

.open .left{transform:translateX(-100%);}
.open .right{transform:translateX(100%);}

/* BUTTON */
button{
  padding:12px 16px;
  margin:6px;
  border:none;
  border-radius:10px;
}

/* RESULT */
.good{color:#22c55e;font-size:26px;}
.bad{color:#ef4444;font-size:22px;}

/* CAMERA FULL OVERLAY (VISUAL ONLY) */
#reader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  background:black;
  z-index:9999;
}

/* SCAN TEXT */
.scanText{
  position:fixed;
  top:20px;
  width:100%;
  text-align:center;
  font-size:18px;
  z-index:10000;
}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Escape Box Game</h2>

<div id="lock">🔒</div>

<div class="door" id="door">
  <div class="left"></div>
  <div class="right"></div>
</div>

<div id="result">Step 1: Scan First Box</div>

<button onclick="scanFirst()">📷 Scan First Box</button>
<button onclick="scanSecond()">📷 Scan Second Box</button>
<button onclick="resetGame()">Reset</button>

</div>

<div id="reader"></div>
<div id="scanText" class="scanText"></div>

<script>

let firstBox = null;

/* INIT QR LINK */
function init(){
  let box = new URLSearchParams(window.location.search).get("box");
  if(box){
    firstBox = box;
    sessionStorage.setItem("firstBox", box);

    document.getElementById("result").innerHTML =
      "✔ First box (QR): <b>"+box+"</b><br>👉 Step 2: Scan second box";
  }
}

/* SOUND */
function beep(ok){
  let ctx = new AudioContext();
  let o = ctx.createOscillator();
  o.frequency.value = ok ? 900 : 200;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),120);
}

/* VIBRATE */
function vibrate(ok){
  if(navigator.vibrate){
    navigator.vibrate(ok ? [100,50,100] : [300]);
  }
}

/* CAMERA SHOW */
function showCamera(text){
  document.getElementById("reader").style.display = "block";
  document.getElementById("scanText").innerText = text;
}

/* CAMERA HIDE */
function hideCamera(){
  document.getElementById("reader").style.display = "none";
  document.getElementById("scanText").innerText = "";
}

/* SCAN FIRST */
function scanFirst(){

  showCamera("Scan FIRST box");

  let scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps:10, qrbox:250 },
    (text)=>{

      firstBox = text.includes("box=")
        ? text.split("box=")[1]
        : text;

      sessionStorage.setItem("firstBox", firstBox);

      scanner.stop();
      hideCamera();

      document.getElementById("result").innerHTML =
        "✔ First box: <b>"+firstBox+"</b><br>👉 Step 2: Scan second box";

    }
  );
}

/* SCAN SECOND */
function scanSecond(){

  if(!firstBox){
    alert("Scan first box dulu!");
    return;
  }

  showCamera("Scan SECOND box");

  let scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps:10, qrbox:250 },
    (text)=>{

      let secondBox = text.includes("box=")
        ? text.split("box=")[1]
        : text;

      scanner.stop();
      hideCamera();

      check(secondBox);
    }
  );
}

/* RESULT */
function check(secondBox){

  let ok = (firstBox === secondBox);

  beep(ok);
  vibrate(ok);

  if(ok){
    document.getElementById("lock").innerText="🔓";
    document.getElementById("lock").classList.add("unlock");
    document.getElementById("door").classList.add("open","glow");

    document.getElementById("result").innerHTML =
      "<div class='good'>TREASURE UNLOCKED 🎉</div>";
  }else{
    document.getElementById("result").innerHTML =
      "<div class='bad'>WRONG ❌</div>";
  }

  sessionStorage.removeItem("firstBox");
}

/* RESET */
function resetGame(){
  sessionStorage.clear();
  location.href = location.pathname;
}

init();

</script>

</body>
</html>
